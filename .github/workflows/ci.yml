name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json
            server/package-lock.json
      - name: Install root tooling
        run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Install client
        run: npm install --prefix client
      - name: Install server
        run: npm ci --prefix server
      - name: Lint client
        run: npm run lint --prefix client
      - name: Typecheck
        run: npm run typecheck --prefix client && npm run typecheck --prefix server
      - name: Test
        run: npm run test --prefix server && npm run test --prefix client
      - name: Build
        run: npm run build --prefix client && npm run build --prefix server
